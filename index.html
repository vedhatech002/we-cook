<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>We Cook</title>
  <link rel="stylesheet" href="./public/main.css">
</head>

<body>
  <header class="font-poppins px-9 py-8 flex items-center justify-between w-[80%] mx-auto">
    <div class="logo flex items-center gap-2">
      <img src="./public/images/Subtract.png" alt="logo">
      <h4 class="text-xl font-extrabold">WeCook</h4>
    </div>
    <div class=" flex items-center justify-between gap-3">
      <!-- search bar section -->
      <div class=" relative">
        <input type="text" name="search" id="search"
          class="border-[1.5px] border-zinc-500  rounded-lg outline-none text-zinc-500  pl-4 pr-14 py-1 text-sm"
          placeholder="Enter item or restaurant you are looking for">
        <span class="absolute top-2 right-3">
          <svg width="14" height="14" viewBox="0 0 21 21" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path id="Vector"
              d="M1 20L5.486 15.506M3 9.5C3 11.7543 3.89553 13.9163 5.48959 15.5104C7.08365 17.1045 9.24566 18 11.5 18C13.7543 18 15.9163 17.1045 17.5104 15.5104C19.1045 13.9163 20 11.7543 20 9.5C20 7.24566 19.1045 5.08365 17.5104 3.48959C15.9163 1.89553 13.7543 1 11.5 1C9.24566 1 7.08365 1.89553 5.48959 3.48959C3.89553 5.08365 3 7.24566 3 9.5V9.5Z"
              stroke="#808080" stroke-width="2" stroke-linecap="round" />
          </svg>
        </span>
      </div>
      <!-- cart -->
      <div>
        <span>
          <svg width="24" height="25" viewBox="0 0 30 31" fill="none" xmlns="http://www.w3.org/2000/svg">
            <g id="Bag">
              <path id="Vector"
                d="M19.2857 14.4285V7.88092C19.2857 6.49169 18.7777 5.15936 17.8735 4.17702C16.9693 3.19469 15.743 2.64282 14.4643 2.64282C13.1855 2.64282 11.9592 3.19469 11.055 4.17702C10.1508 5.15936 9.64282 6.49169 9.64282 7.88092V14.4285"
                stroke="#202020" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
              <rect id="Rectangle 16" x="5.28577" y="10.0714" width="18.3571" height="18.3571" rx="3.6" stroke="#202020"
                stroke-width="2" />
            </g>
          </svg>
        </span>
      </div>
      <!-- sign-in -->
      <button
        class="outline-none border-none rounded-lg bg-neutral-800 text-neutral-50 py-1.5 px-4 text-sm font-inter font-semibold cursor-pointer hover:bg-orange-500">Sign
        in</button>

    </div>
  </header>
  <!-- main -->
  <main>
    <!-- hero section -->
    <section class=" h-full w-full relative font-poppins">
      <img class="pt-36" src="./public/images/BACKGROUND.png" alt="herobg">
      <!-- hero sectionconternt -->
      <div class="grid grid-cols-2 absolute top-14 w-full">
        <!-- title and paragraph -->
        <div class="flex flex-col items-center justify-center ml-32 mt-4">
          <!-- title -->
          <div>
            <h1 class="text-5xl ">Premium quality<br>
              Food for your
              healthy<br>
              & Daily Life
            </h1>
          </div>

        </div>

      </div>

    </section>
  </main>
</body>

</html>
